# Preserve client HTTPS when a reverse proxy (e.g. Traefik) already set
# X-Forwarded-Proto. Using only $scheme here would always be "http" for
# Traefik → nginx (internal hop) and wrong for the public URL.
map $http_x_forwarded_proto $ssc_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    resolver 127.0.0.11 valid=10s;
    access_log off;
    error_log /dev/null crit;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        set $backend_upstream "http://backend:8080";
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Do not forward client Host (untrusted); use upstream from proxy_pass
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ssc_forwarded_proto;
        
        # WebSocket specific headers
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;
        
        # Timeout settings for WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 7d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
