name: Build and Push Scanner Image

# Scanner-Image (scanner/Dockerfile) mit Tags 2.0.0 und latest zu Docker Hub pushen
on:
  workflow_dispatch:  # Manuell auslösen

env:
  SCANNER_IMAGE_NAME: simpleseccheck-scanner
  DOCKER_USERNAME: fr4iser
  SCANNER_VERSION: "2.0.0"

jobs:
  build-and-push-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push scanner image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./scanner/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.SCANNER_IMAGE_NAME }}:${{ env.SCANNER_VERSION }}
            ${{ env.DOCKER_USERNAME }}/${{ env.SCANNER_IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ env.SCANNER_VERSION }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ env.SCANNER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ env.SCANNER_IMAGE_NAME }}:buildcache,mode=max

      - name: Image tags
        run: |
          echo "Pushed ${{ env.DOCKER_USERNAME }}/${{ env.SCANNER_IMAGE_NAME }}:${{ env.SCANNER_VERSION }}"
          echo "Pushed ${{ env.DOCKER_USERNAME }}/${{ env.SCANNER_IMAGE_NAME }}:latest"
