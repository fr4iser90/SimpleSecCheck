# Scanner Configuration
# This file defines the configuration for all available scanners

scanners:
  # Static Analysis Scanners
  bandit:
    enabled: true
    timeout: 600
    description: "Python static security analysis"
    docker_image: "bandit:latest"
    
  semgrep:
    enabled: true
    timeout: 900
    description: "Multi-language static analysis"
    docker_image: "semgrep/semgrep:latest"
    
  eslint:
    enabled: true
    timeout: 600
    description: "JavaScript/TypeScript linting"
    docker_image: "eslint:latest"
    
  safety:
    enabled: true
    timeout: 300
    description: "Python dependency vulnerability scanning"
    docker_image: "safety:latest"
    
  # Container Security Scanners
  trivy:
    enabled: true
    timeout: 1200
    description: "Container vulnerability scanner"
    docker_image: "aquasec/trivy:latest"
    
  clair:
    enabled: false
    timeout: 1200
    description: "Container vulnerability analysis"
    docker_image: "clair:latest"
    
  # Infrastructure Scanners
  checkov:
    enabled: true
    timeout: 900
    description: "Infrastructure as Code scanning"
    docker_image: "bridgecrew/checkov:latest"
    
  # Web Application Scanners
  zap:
    enabled: true
    timeout: 1800
    description: "OWASP ZAP web application scanner"
    docker_image: "owasp/zap2docker-stable:latest"
    
  nikto:
    enabled: true
    timeout: 1800
    description: "Web server scanner"
    docker_image: "nikto:latest"
    
  # Secret Detection
  gitleaks:
    enabled: true
    timeout: 600
    description: "Secret detection in git repositories"
    docker_image: "gitleaks/gitleaks:latest"
    
  detect-secrets:
    enabled: true
    timeout: 600
    description: "Secret detection tool"
    docker_image: "detect-secrets:latest"
    
  trufflehog:
    enabled: true
    timeout: 900
    description: "Secret detection in git history"
    docker_image: "trufflesecurity/trufflehog:latest"
    
  # Mobile App Scanners
  android:
    enabled: true
    timeout: 1200
    description: "Android application scanner"
    docker_image: "android-scanner:latest"
    
  ios:
    enabled: true
    timeout: 1200
    description: "iOS application scanner"
    docker_image: "ios-scanner:latest"
    
  # Kubernetes Scanners
  kube-bench:
    enabled: true
    timeout: 600
    description: "Kubernetes security benchmark"
    docker_image: "aquasec/kube-bench:latest"
    
  kube-hunter:
    enabled: true
    timeout: 900
    description: "Kubernetes penetration testing"
    docker_image: "aquasec/kube-hunter:latest"
    
  # Cloud Security Scanners
  aws-prowler:
    enabled: true
    timeout: 900
    description: "AWS security assessment"
    docker_image: "prowler/prowler:latest"
    
  # Database Scanners
  sqlmap:
    enabled: true
    timeout: 1800
    description: "SQL injection testing"
    docker_image: "sqlmap/sqlmap:latest"

# Global Scanner Settings
global:
  timeout: 3600
  max_concurrent: 5
  retry_attempts: 3
  retry_delay: 30
  
  # Docker Configuration
  docker:
    network: "simpleseccheck"
    socket: "/var/run/docker.sock"
    cleanup: true
    remove_volumes: true
    
  # Output Configuration
  output:
    format: "json"
    include_raw: false
    compress_results: true
    
  # Security Configuration
  security:
    allow_privileged: false
    seccomp_profile: "default"
    apparmor_profile: "unconfined"
    
# Scanner Dependencies
dependencies:
  python:
    - bandit
    - safety
    - detect-secrets
    
  javascript:
    - eslint
    - semgrep
    
  docker:
    - trivy
    - clair
    - docker-bench
    
  infrastructure:
    - checkov
    - terraform-compliance
    
  web:
    - zap
    - nikto
    - sqlmap
    
  secrets:
    - gitleaks
    - trufflehog
    - detect-secrets