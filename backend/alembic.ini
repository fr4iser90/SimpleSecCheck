# Alembic config – schema is versioned here; no create_all or _ensure_* for schema.
# Run: alembic upgrade head  (from backend/ or with PYTHONPATH=backend)
[alembic]
script_location = alembic
prepend_sys_path = .
# url set in env.py from config.settings
version_path_separator = os

[post_write_hooks]
# optional: format with black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
