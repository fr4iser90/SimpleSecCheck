# =============================================================================
# SimpleSecCheck Production with Traefik Reverse Proxy
# =============================================================================
# This is a template configuration for using SimpleSecCheck behind Traefik.
# 
# Prerequisites:
# - Traefik must be running with a network named "proxy"
# - Set DOMAIN environment variable (e.g., DOMAIN=example.com)
# - Adjust Traefik labels according to your setup
#
# Usage:
#   export DOMAIN=example.com
#   docker-compose -f docker-compose.prod.traefik.yml --profile dev up -d
# =============================================================================

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:16-alpine
    container_name: SimpleSecCheck_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simpleseccheck}
      POSTGRES_USER: ${POSTGRES_USER:-ssc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - SimpleSecCheck_network
      - SimpleSecCheck_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssc_user} -d ${POSTGRES_DB:-simpleseccheck}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  scanner:
    # Production Scanner Service - Used for executing scans via docker-compose run
    # NOTE: Scanner Worker runs in WebUI container, not as separate service
    # This service is only used when WebUI calls docker-compose run scanner
    profiles:
      - scan
    build:
      context: .
      dockerfile: ./scanner/Dockerfile
      args:
        VERSION: 1.4.0
    image: simpleseccheck-scanner:local
    pull_policy: never
    container_name: SimpleSecCheck_scanner_prod
    user: "${PUID:-1000}:${PGID:-1000}"
    # Resource Limits - Scanner is CPU/Memory intensive (runs multiple security tools)
    deploy:
      resources:
        limits:
          cpus: '${SCANNER_CPU_LIMIT:-4.0}'      # Max 4 CPUs (adjust based on server)
          memory: '${SCANNER_MEMORY_LIMIT:-8G}'  # Max 8GB RAM (adjust based on server)
        reservations:
          cpus: '${SCANNER_CPU_RESERVATION:-1.0}'  # Reserve 1 CPU
          memory: '${SCANNER_MEMORY_RESERVATION:-2G}'  # Reserve 2GB RAM
    volumes:
      - ./results:/app/results
    environment:
      - SCAN_TARGET=${SCAN_TARGET:-}
      - TARGET_PATH_IN_CONTAINER=${TARGET_PATH_IN_CONTAINER:-/target}
      - RESULTS_DIR_IN_CONTAINER=/app/results
      - ENVIRONMENT=prod
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ssc_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-simpleseccheck}
      # Optional API Tokens (loaded from .env file if present)
      - NVD_API_KEY=${NVD_API_KEY:-}
      - SNYK_TOKEN=${SNYK_TOKEN:-}
    networks:
      - SimpleSecCheck_network
    # Note: Scanner Worker runs in WebUI container, not here
    # This service is only used for docker-compose run scanner commands

  frontend:
    # Production Frontend with Traefik - Start with: docker-compose -f docker-compose.prod.traefik.yml --profile dev up
    # Production Mode: Auto-shutdown deaktiviert, PostgreSQL aktiv, nur Git Scans
    # Traefik Reverse Proxy Configuration
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.nginx
    container_name: SimpleSecCheck_frontend
    # Entrypoint script will dynamically configure docker group access at runtime
    # No need to specify user here - entrypoint handles it
    # Ports removed - Traefik handles routing
    # ports:
    #   - "0.0.0.0:8080:8080"  # Not needed with Traefik
    volumes:
      - ./results:/app/results
    environment:
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    networks:
      - SimpleSecCheck_network
      - proxy  # Traefik network
    depends_on:
      postgres:
        condition: service_healthy
      # Note: Scanner Worker runs in this WebUI container, not as separate service
    # Security: no privileged mode, no capabilities
    security_opt:
      - no-new-privileges:true
    read_only: false  # Allow writes to /tmp only (for uvicorn)
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    restart: unless-stopped  # Production: Auto-restart
    # Resource Limits - WebUI is lightweight (FastAPI + React frontend)
    deploy:
      resources:
        limits:
          cpus: '${WEBUI_CPU_LIMIT:-2.0}'      # Max 2 CPUs (usually needs less)
          memory: '${WEBUI_MEMORY_LIMIT:-2G}'  # Max 2GB RAM (usually needs less)
        reservations:
          cpus: '${WEBUI_CPU_RESERVATION:-0.5}'  # Reserve 0.5 CPU
          memory: '${WEBUI_MEMORY_RESERVATION:-512M}'  # Reserve 512MB RAM
    labels:
      # Traefik Enable
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      
      # Frontend Router (nur für nicht-/api Requests)
      - "traefik.http.routers.simpleseccheck-frontend.rule=Host(`ssc.${DOMAIN}`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.simpleseccheck-frontend.entrypoints=websecure"
      - "traefik.http.routers.simpleseccheck-frontend.tls=true"
      - "traefik.http.routers.simpleseccheck-frontend.tls.certresolver=http_resolver"
      # Add your custom middlewares here (e.g., authentication, rate limiting)
      # Example: - "traefik.http.routers.simpleseccheck-frontend.middlewares=default@file,auth@file"
      - "traefik.http.routers.simpleseccheck-frontend.priority=10"
      
      # Frontend Service
      - "traefik.http.services.simpleseccheck-frontend.loadbalancer.server.port=8080"
      - "traefik.http.routers.simpleseccheck-frontend.service=simpleseccheck-frontend"
      
      # API Router (für /api Requests)
      - "traefik.http.routers.simpleseccheck-api.rule=Host(`ssc.${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.simpleseccheck-api.entrypoints=websecure"
      - "traefik.http.routers.simpleseccheck-api.tls=true"
      - "traefik.http.routers.simpleseccheck-api.tls.certresolver=http_resolver"
      - "traefik.http.routers.simpleseccheck-api.priority=20"
      
      # API Service
      - "traefik.http.services.simpleseccheck-api.loadbalancer.server.port=8080"
      # Rate limiting middleware chain (default@file + rate-limit@docker)
      - "traefik.http.routers.simpleseccheck-api.middlewares=default@file,ssc-rate-limit@docker"
      - "traefik.http.routers.simpleseccheck-api.service=simpleseccheck-frontend"
      # Rate limit middleware (docker provider)
      - "traefik.http.middlewares.ssc-rate-limit.ratelimit.average=50"
      - "traefik.http.middlewares.ssc-rate-limit.ratelimit.burst=100"

  backend:
    # Separate worker for executing scans (isolated from public WebUI)
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: SimpleSecCheck_backend
    # No public ports
    volumes:
      - ./results:/app/results
      - .:/project:ro
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket required for scan execution
    environment:
      - SIMPLESECCHECK_ROOT=/app
      - PYTHONUNBUFFERED=1
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - HOST_PROJECT_ROOT=${PWD}
      - SCANNER_PROXY_MODE=false
      # Compose file is always renamed to docker-compose.yml on the server
      - DOCKER_COMPOSE_FILE=/project/docker-compose.yml
      - ENVIRONMENT=prod
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ssc_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-simpleseccheck}
      - SESSION_MANAGEMENT=true
      - QUEUE_ENABLED=true
      - METADATA_COLLECTION=always
      - ONLY_GIT_SCANS=true
      # Worker enabled here
      - SCANNER_WORKER_ENABLED=true
      # Session config (required for queue access in prod)
      - SESSION_DURATION=${SESSION_DURATION:-86400}
      - SESSION_STORAGE=postgresql
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-session_id}
      - SESSION_HEADER_NAME=${SESSION_HEADER_NAME:-X-Session-ID}
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_SAMESITE=lax
      # Queue config
      - MAX_QUEUE_LENGTH=${MAX_QUEUE_LENGTH:-1000}
      - MAX_CONCURRENT_SCANS=${MAX_CONCURRENT_SCANS:-1}
      - QUEUE_DEDUPLICATION=true
      - QUEUE_FAIRNESS_MODE=fifo
      # Rate Limiting
      - RATE_LIMIT_PER_SESSION_SCANS=${RATE_LIMIT_PER_SESSION_SCANS:-10}
      - RATE_LIMIT_PER_SESSION_REQUESTS=${RATE_LIMIT_PER_SESSION_REQUESTS:-100}
      - RATE_LIMIT_PER_IP_SCANS=${RATE_LIMIT_PER_IP_SCANS:-50}
      - RATE_LIMIT_PER_IP_REQUESTS=${RATE_LIMIT_PER_IP_REQUESTS:-1000}
      # Size Limits
      - MAX_ZIP_UPLOAD_SIZE=${MAX_ZIP_UPLOAD_SIZE:-100M}
      - MAX_GIT_REPO_SIZE=${MAX_GIT_REPO_SIZE:-500M}
      - MAX_SCAN_DISK_USAGE=${MAX_SCAN_DISK_USAGE:-2G}
      # Scan Deduplication
      - SCAN_DEDUPLICATION_ENABLED=true
      - SCAN_DEDUPLICATION_AGE_DAYS=${SCAN_DEDUPLICATION_AGE_DAYS:-7}
      # Optional Features
      - STATISTICS_ENABLED=${STATISTICS_ENABLED:-true}
      - ZIP_UPLOAD_ENABLED=${ZIP_UPLOAD_ENABLED:-true}
      # OWASP Auto-Update Configuration (Production only)
      - OWASP_AUTO_UPDATE_ENABLED=${OWASP_AUTO_UPDATE_ENABLED:-true}
      - OWASP_AUTO_UPDATE_INTERVAL_DAYS=${OWASP_AUTO_UPDATE_INTERVAL_DAYS:-7}
      - OWASP_AUTO_UPDATE_CHECK_INTERVAL_HOURS=${OWASP_AUTO_UPDATE_CHECK_INTERVAL_HOURS:-24}
      # CORS Configuration (not used by worker, but keep consistent)
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    networks:
      - SimpleSecCheck_network
      - SimpleSecCheck_internal
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  SimpleSecCheck_network:
    driver: bridge
  SimpleSecCheck_internal:
    driver: bridge
    internal: true
  proxy:
    external: true  # Traefik network (must exist)

volumes:
  results_data:
  logs_data:
  postgres_data:  # PostgreSQL data persistence
