services:
  postgres:
    profiles:
      - prod
    image: postgres:16-alpine
    container_name: SimpleSecCheck_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simpleseccheck}
      POSTGRES_USER: ${POSTGRES_USER:-ssc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - SimpleSecCheck_network
      - SimpleSecCheck_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssc_user} -d ${POSTGRES_DB:-simpleseccheck}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  scanner:
    profiles:
      - scan
    # LOKALES BUILDING AKTIVIERT
    build:
      context: .
      dockerfile: ./scanner/Dockerfile
      args:
        VERSION: 1.4.0
    image: simpleseccheck-scanner:local
    container_name: SimpleSecCheck_scanner_v1.4.0
    deploy:
      resources:
        limits:
          cpus: '${SCANNER_CPU_LIMIT:-4.0}'
          memory: '${SCANNER_MEMORY_LIMIT:-8G}'
        reservations:
          cpus: '${SCANNER_CPU_RESERVATION:-1.0}'
          memory: '${SCANNER_MEMORY_RESERVATION:-2G}'
    volumes:
      - ./results:/app/results
      # Config ist bereits im Image (über COPY scanner/ im Dockerfile) - kein Volume-Mount nötig
      # OWASP Dependency Check data directory - cached to avoid re-downloading 300K+ vulnerabilities on every build
      - ${HOST_PROJECT_ROOT:-.}/scanner/scanners/owasp/data:/app/scanner/scanners/owasp/data
      - /var/run/docker.sock:/var/run/docker.sock # For Docker Bench
    environment:
      - SCAN_TARGET=${SCAN_TARGET:-}
      - TARGET_PATH_IN_CONTAINER=${TARGET_PATH_IN_CONTAINER:-/target}
      - RESULTS_DIR_IN_CONTAINER=/app/results
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - DATABASE_URL=${DATABASE_URL:-}
      # Optional API Tokens (loaded from .env file if present)
      - NVD_API_KEY=${NVD_API_KEY:-}
      - SNYK_TOKEN=${SNYK_TOKEN:-}
    networks:
      - SimpleSecCheck_network
    restart: "no"
    stdin_open: true
    tty: true

  frontend:
    profiles:
      - dev
      - prod
    # Optional WebUI - Start with: docker-compose --profile dev up
    # ⚠️ WARNING: NEVER expose publicly! Only use on localhost!
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.nginx
    container_name: SimpleSecCheck_frontend
    ports:
      - "${WEBUI_BIND_HOST:-127.0.0.1}:8080:8080"
    volumes:
      - ./results:/app/results
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-dev}
    networks:
      - SimpleSecCheck_network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=100m



  backend:
    profiles:
      - dev
      - prod
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: SimpleSecCheck_backend
    volumes:
      - ./results:/app/results
      - .:/project:ro
      - ${HOST_PROJECT_ROOT:-.}/scanner/scanners/owasp/data:/app/scanner/scanners/owasp/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SIMPLESECCHECK_ROOT=/app
      - PYTHONUNBUFFERED=1
      - HOST_PROJECT_ROOT=${PWD}
      - SCANNER_WORKER_ENABLED=true
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - SCANNER_PROXY_MODE=false
    networks:
      - SimpleSecCheck_network
      - SimpleSecCheck_internal
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  SimpleSecCheck_network:
    driver: bridge
  SimpleSecCheck_internal:
    driver: bridge
    internal: true

volumes:
  results_data:
  logs_data:
  postgres_data:
