services:
  scanner:
    # LOKALES BUILDING AKTIVIERT
    build:
      context: .
      dockerfile: ./scanner/Dockerfile
      args:
        VERSION: 1.4.0
    image: fr4iser/simpleseccheck:latest
    container_name: SimpleSecCheck_scanner_v1.4.0
    volumes:
      - ./results:/SimpleSecCheck/results
      - ./logs:/SimpleSecCheck/logs
      # Config ist bereits im Image (über COPY scanner/ im Dockerfile) - kein Volume-Mount nötig
      # OWASP Dependency Check data directory - cached to avoid re-downloading 300K+ vulnerabilities on every build
      - ./owasp-dependency-check-data:/SimpleSecCheck/owasp-dependency-check-data
      - /var/run/docker.sock:/var/run/docker.sock # For Docker Bench
    environment:
      - TARGET_URL=${TARGET_URL:-http://host.docker.internal:8000}
      - TARGET_PATH_IN_CONTAINER=${TARGET_PATH_IN_CONTAINER:-/target}
      - RESULTS_DIR_IN_CONTAINER=/SimpleSecCheck/results
      - LOGS_DIR_IN_CONTAINER=/SimpleSecCheck/logs
      - SEMGREP_RULES_PATH_IN_CONTAINER=/SimpleSecCheck/scanner/config/rules
      - TRIVY_CONFIG_PATH_IN_CONTAINER=/SimpleSecCheck/scanner/config/tools/trivy/config.yaml
      - ANCHORE_CONFIG_PATH_IN_CONTAINER=/SimpleSecCheck/scanner/config/tools/anchore/config.yaml
      - ANCHORE_IMAGE=${ANCHORE_IMAGE:-}
      - ZAP_CONFIG_PATH_IN_CONTAINER=/SimpleSecCheck/scanner/config/tools/zap/baseline.conf
      - TRIVY_SCAN_TYPE=fs
      - FP_WHITELIST_FILE=/SimpleSecCheck/scanner/config/policy/fp_whitelist.json
      # Optional API Tokens (loaded from .env file if present)
      - NVD_API_KEY=${NVD_API_KEY:-}
      - SNYK_TOKEN=${SNYK_TOKEN:-}
    networks:
      - SimpleSecCheck_network
    restart: "no"
    stdin_open: true
    tty: true

  webui:
    # Optional WebUI - Start with: docker-compose --profile webui up
    # ⚠️ WARNING: NEVER expose publicly! Only use on localhost!
    build:
      context: .
      dockerfile: ./webui/Dockerfile.compose
    container_name: SimpleSecCheck_webui
    # Entrypoint script will dynamically configure docker group access at runtime
    # No need to specify user here - entrypoint handles it
    ports:
      - "127.0.0.1:8080:8080"  # SAFE: Only localhost, not 0.0.0.0
    volumes:
      - ./scripts:/app/scripts:ro            # CLI Scripts (read-only) - DEVELOPMENT ONLY: Hot-Reload ohne Image-Rebuild
      - ./results:/app/results                # Results (read-write: run-docker.sh needs to create subdirs)
      - ./logs:/app/logs:ro                  # Logs (read-only)
      # Config ist bereits im Image (über COPY scanner/ im Dockerfile) - kein Volume-Mount nötig (Dev: für Hot-Reload könnte man es mounten, aber wir behandeln Dev=Prod)
      - ./docker-compose.yml:/app/docker-compose.yml:ro  # docker-compose.yml (read-only, needed by run-docker.sh)
      - ./Dockerfile:/app/Dockerfile:ro       # Dockerfile (read-only, needed for scanner build)
      - .:/project:ro                         # Project root (read-only, needed as build context for scanner)
      - ./owasp-dependency-check-data:/app/owasp-dependency-check-data  # OWASP database (read-write: for updates and checks)
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker socket (read-only, for docker-compose)
    environment:
      - SIMPLESECCHECK_ROOT=/app
      - PYTHONUNBUFFERED=1
      # Host project root for OWASP volume mounting (used by run-docker.sh)
      - HOST_PROJECT_ROOT=${PWD}
      # Auto-shutdown configuration (security feature)
      - WEBUI_AUTO_SHUTDOWN=true             # Enable auto-shutdown
      - WEBUI_SHUTDOWN_AFTER_SCAN=true       # Shutdown after scan completes
      - WEBUI_SHUTDOWN_DELAY=300             # Wait 5 min after scan to view report
      - WEBUI_IDLE_TIMEOUT=1800              # Shutdown after 30 min idle
    networks:
      - SimpleSecCheck_network
    profiles:
      - webui  # Only start with: docker-compose --profile webui up
    depends_on:
      - scanner  # For docker-compose.yml access
    # Security: no privileged mode, no capabilities
    security_opt:
      - no-new-privileges:true
    read_only: false  # Allow writes to /tmp only (for uvicorn)
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

networks:
  SimpleSecCheck_network:
    driver: bridge

volumes:
  results_data:
  logs_data:
