name: codeql
install:
  - ["/bin/sh", "-c", "CODEQL_URL=$(wget -qO- https://api.github.com/repos/github/codeql-cli-binaries/releases/latest | jq -r '.assets[] | select(.name | test(\"codeql-linux64.zip\")) | .browser_download_url') && wget -O /tmp/codeql.zip $CODEQL_URL"]
  - ["unzip", "/tmp/codeql.zip", "-d", "/opt"]
  - ["rm", "/tmp/codeql.zip"]
  - ["ln", "-s", "/opt/codeql/codeql", "/usr/local/bin/codeql"]
  - ["codeql", "pack", "download", "codeql/python-queries"]
  - ["codeql", "pack", "download", "codeql/javascript-queries"]
  - ["codeql", "pack", "download", "codeql/java-queries"]
  - ["codeql", "pack", "download", "codeql/cpp-queries"]
  - ["codeql", "pack", "download", "codeql/csharp-queries"]
  - ["codeql", "pack", "download", "codeql/go-queries"]