id: detect_secrets
version: '1.0'
display_name: Detect Secrets
description: Enterprise-ready secret detection tool. Prevents secrets from entering
  codebase.
categories:
- secrets
icon: 🕵️
languages: null
severity_supported: false
execution:
  timeout: 300
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - detect-secrets
  - --version
homepage: https://github.com/Yelp/detect-secrets
documentation: https://github.com/Yelp/detect-secrets#readme
install:
- - pip3
  - install
  - detect-secrets>=1.5.0
