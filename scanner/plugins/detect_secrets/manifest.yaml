id: detect_secrets
version: '1.0'
display_name: Detect Secrets
description: Enterprise-ready secret detection tool. Prevents secrets from entering
  codebase.
categories:
- secrets
icon: 🕵️
languages: null
severity_supported: false
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - detect-secrets
  - --version
homepage: https://github.com/bridgecrewio/detect-secrets
documentation: https://github.com/bridgecrewio/detect-secrets#readme
install:
# Use Bridgecrew fork (`bc-detect-secrets`), NOT PyPI `detect-secrets` (Yelp): both
# ship `detect_secrets` and the same `detect-secrets` CLI. Yelp wins on pip install
# order and breaks Checkov's secrets runner (AttributeError: FileType.JSON).
- - pip3
  - install
  - bc-detect-secrets
scan_profiles:
  quick:
    timeout: 60
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 90
  deep:
    timeout: 120
    hints:
      depth: deep
      intensity: high
exit_codes:
  binary: detect-secrets
  codes:
    0: Success — no secrets detected (scan mode) or command completed.
    1: Secrets detected in hook/audit mode, or command failed.
    2: Invalid usage or configuration error.
