id: zap
version: '1.0'
display_name: Zap
description: OWASP ZAP - Web application security scanner. Finds vulnerabilities in
  web applications.
categories:
- web
- web_application_security
- dast
icon: 🕷️
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.xml
  artifact_format: any
homepage: https://www.zaproxy.org
documentation: https://www.zaproxy.org/docs/
install:
- - wget
  - https://github.com/zaproxy/zaproxy/releases/download/v2.16.1/ZAP_2.16.1_Linux.tar.gz
- - tar
  - -xvzf
  - ZAP_2.16.1_Linux.tar.gz
  - -C
  - /opt
- - rm
  - ZAP_2.16.1_Linux.tar.gz
- - wget
  - https://raw.githubusercontent.com/zaproxy/zaproxy/main/docker/zap-baseline.py
  - -O
  - /usr/local/bin/zap-baseline.py
- - chmod
  - +x
  - /usr/local/bin/zap-baseline.py
- - wget
  - https://raw.githubusercontent.com/zaproxy/zaproxy/main/docker/zap_common.py
  - -O
  - /usr/local/bin/zap_common.py
- - mkdir
  - -p
  - /zap/wrk/zap
- - cp
  - /app/scanner/plugins/zap/config/baseline.conf
  - /zap/wrk/zap/baseline.conf
- - cp
  - -r
  - /opt/ZAP_2.16.1/
  - /zap/
- - ln
  - -sf
  - /zap/zap.sh
  - /zap/zap-x.sh
assets:
- id: baseline_conf
  type: config
  description: ZAP baseline configuration
  mount:
    host_subpath: scanner/plugins/zap/config/baseline.conf
    container_path: /app/scanner/plugins/zap/config/baseline.conf
# User-facing scan profiles (quick / standard / deep). Consumed by backend + orchestrator via DB metadata.
scan_profiles:
  quick:
    timeout: 180
    hints:
      depth: shallow
      intensity: low
      coverage: essential
    env:
      ZAP_OPTIONS: >-
        -config api.disablekey=true -config spider.maxDuration=5 -config scanner.maxDuration=0
        -config scanner.maxRuleTimeInMs=30000
      ZAP_USE_ACTIVE_SCAN: "0"
      ZAP_STARTUP_DELAY: "15"
  standard:
    timeout: 300
    hints:
      depth: medium
      intensity: medium
      coverage: balanced
    env:
      ZAP_OPTIONS: >-
        -config api.disablekey=true -config spider.maxDuration=10 -config scanner.maxDuration=30
        -config scanner.maxRuleTimeInMs=60000
      ZAP_USE_ACTIVE_SCAN: "1"
      ZAP_STARTUP_DELAY: "25"
  deep:
    timeout: 600
    hints:
      depth: deep
      intensity: high
      coverage: broad
    env:
      ZAP_OPTIONS: >-
        -config api.disablekey=true -config spider.maxDuration=30 -config scanner.maxDuration=60
        -config scanner.maxRuleTimeInMs=120000
      ZAP_USE_ACTIVE_SCAN: "1"
      ZAP_STARTUP_DELAY: "35"
exit_codes:
  binary: zap-baseline.py
  codes:
    0: Pass — no alerts above configured threshold.
    1: WARN level alerts (baseline script convention).
    2: FAIL — high/critical alerts or scan failure.
    3: Script/setup error (ZAP not found, bad target).
