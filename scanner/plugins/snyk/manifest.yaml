id: snyk
version: '1.0'
display_name: Snyk
description: Developer security platform. Scans code and dependencies for vulnerabilities
  and license issues.
categories:
- dependency
- code
icon: 🔐
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - snyk
  - version
homepage: https://snyk.io
documentation: https://docs.snyk.io/
install:
- - /bin/sh
  - -c
  - curl -s https://static.snyk.io/cli/latest/snyk-linux -o /tmp/snyk && chmod +x
    /tmp/snyk && mv /tmp/snyk /usr/local/bin/snyk
scan_profiles:
  quick:
    timeout: 90
    hints:
      depth: shallow
      intensity: low
    env:
      SNYK_EXTRA_ARGS: "--severity-threshold=high"
  standard:
    timeout: 150
    env:
      SNYK_EXTRA_ARGS: "--severity-threshold=medium"
  deep:
    timeout: 240
    hints:
      depth: deep
      intensity: high
    env:
      SNYK_EXTRA_ARGS: "--severity-threshold=low"
exit_codes:
  binary: snyk
  codes:
    0: Success — no issues or scan completed per Snyk policy.
    1: Issues found (vulnerabilities/license) or generic failure.
    2: Bad arguments or missing token.
    3: User not authenticated (SNYK_TOKEN missing/invalid).
