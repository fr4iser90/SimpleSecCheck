id: eslint
version: '1.0'
display_name: Eslint
description: JavaScript and TypeScript linter with security rules. Finds code quality
  and security issues.
categories:
- code
- linting
icon: 📝
languages:
- javascript
- typescript
severity_supported: true
execution:
  timeout: 600
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - eslint
  - --version
homepage: https://eslint.org
documentation: https://eslint.org/docs/latest/
install:
- - npm
  - install
  - -g
  - eslint
  - eslint-plugin-security
  - '@typescript-eslint/parser'
  - '@typescript-eslint/eslint-plugin'
- - npm
  - install
  - -g
  - typescript
