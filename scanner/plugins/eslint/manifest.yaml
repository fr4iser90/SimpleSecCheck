id: eslint
version: '1.0'
display_name: Eslint
description: JavaScript and TypeScript linter with security rules. Finds code quality
  and security issues.
categories:
- code
- linting
icon: 📝
languages:
- javascript
- typescript
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - eslint
  - --version
homepage: https://eslint.org
documentation: https://eslint.org/docs/latest/
install:
- - npm
  - install
  - -g
  - eslint
  - eslint-plugin-security
  - '@typescript-eslint/parser'
  - '@typescript-eslint/eslint-plugin'
- - npm
  - install
  - -g
  - typescript
scan_profiles:
  quick:
    timeout: 60
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 90
  deep:
    timeout: 120
    hints:
      depth: deep
      intensity: high
exit_codes:
  binary: eslint
  codes:
    0: No lint problems (or max-warnings not exceeded).
    1: Lint problems found, or ESLint could not run (config/parse error).
    2: Misconfiguration or internal error.
