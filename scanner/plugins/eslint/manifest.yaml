name: eslint
version: "1.0"
description: JavaScript and TypeScript linter with security rules. Finds code quality and security issues.
categories:
  - Code Scanning
  - Linting
icon: "📝"
category: code
languages:
  - javascript
  - typescript
severity_supported: true
timeout: 600
homepage: https://eslint.org
documentation: https://eslint.org/docs/latest/
install:
  - ["npm", "install", "-g", "eslint", "eslint-plugin-security", "@typescript-eslint/parser", "@typescript-eslint/eslint-plugin"]
  - ["npm", "install", "-g", "typescript"]