id: sonarqube
version: '1.0'
display_name: Sonarqube
description: Code quality and security analysis platform. Detects bugs, vulnerabilities,
  and code smells.
categories:
- code
- sast
- code_quality
icon: 📊
languages:
- python
- javascript
- typescript
- java
- go
- csharp
- kotlin
severity_supported: true
execution:
  timeout: 900
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - sonar-scanner
  - --version
homepage: https://www.sonarsource.com/products/sonarqube/
documentation: https://docs.sonarqube.org/
install:
- - npm
  - install
  - -g
  - sonar-scanner
assets:
- id: config
  type: config
  description: SonarQube config
  mount:
    host_subpath: scanner/plugins/sonarqube/config/config.yaml
    container_path: /app/scanner/plugins/sonarqube/config/config.yaml
