id: sonarqube
version: '1.0'
display_name: Sonarqube
description: Code quality and security analysis platform. Detects bugs, vulnerabilities,
  and code smells.
categories:
- code
- sast
- code_quality
icon: 📊
languages:
- python
- javascript
- typescript
- java
- go
- csharp
- kotlin
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - sonar-scanner
  - --version
homepage: https://www.sonarsource.com/products/sonarqube/
documentation: https://docs.sonarqube.org/
install:
- - npm
  - install
  - -g
  - sonar-scanner
assets:
- id: config
  type: config
  description: SonarQube config
  mount:
    host_subpath: scanner/plugins/sonarqube/config/config.yaml
    container_path: /app/scanner/plugins/sonarqube/config/config.yaml
scan_profiles:
  quick:
    timeout: 90
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 150
  deep:
    timeout: 240
    hints:
      depth: deep
      intensity: high
exit_codes:
  binary: sonar-scanner
  codes:
    0: Analysis completed and uploaded successfully.
    1: Quality gate failed OR scanner error (check logs — server unreachable vs gate).
    2: User error — invalid project key, missing properties, or CLI misuse.
    3: Analysis report rejected by server.
