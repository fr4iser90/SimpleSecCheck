id: ios_plist
version: '1.0'
display_name: Ios Plist
description: iOS plist security and configuration analysis.
categories:
- code
- mobile
icon: 🍎
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
homepage: https://developer.apple.com/
documentation: https://developer.apple.com/documentation/
install:
- - pip3
  - install
  - defusedxml
scan_profiles:
  quick:
    timeout: 90
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 120
  deep:
    timeout: 150
    hints:
      depth: deep
      intensity: high
exit_codes:
  note: No single upstream CLI — plist analysis via Python; see scan logs for errors.
