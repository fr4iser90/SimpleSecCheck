id: nuclei
version: '1.0'
display_name: Nuclei
description: Fast vulnerability scanner. Uses templates to scan for known vulnerabilities.
categories:
- web
- web_application_security
- vulnerability_scanning
icon: ⚛️
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - nuclei
  - -version
homepage: https://github.com/projectdiscovery/nuclei
documentation: https://docs.projectdiscovery.io/nuclei/
install:
- - /bin/sh
  - -c
  - NUCLEI_URL=$(wget -qO- https://api.github.com/repos/projectdiscovery/nuclei/releases/latest
    | jq -r '.assets[] | select(.name | test("nuclei.*linux.*amd64.zip")) | .browser_download_url')
    && wget -O /tmp/nuclei.zip $NUCLEI_URL
- - unzip
  - -o
  - /tmp/nuclei.zip
  - -d
  - /opt
- - rm
  - /tmp/nuclei.zip
- - ln
  - -s
  - /opt/nuclei
  - /usr/local/bin/nuclei
assets:
- id: templates
  type: data
  description: Nuclei templates cache
  mount:
    host_subpath: scanner/plugins/nuclei/data
    container_path: /app/scanner/plugins/nuclei/data
  update:
    enabled: true
    command:
    - nuclei
    - -update-templates
    - -ud
    - '{container_path}'
scan_profiles:
  quick:
    timeout: 120
    env:
      NUCLEI_RATE_LIMIT: "50"
      NUCLEI_CONCURRENCY: "10"
      NUCLEI_SEVERITY: "critical,high"
  standard:
    timeout: 240
    env:
      NUCLEI_RATE_LIMIT: "100"
      NUCLEI_CONCURRENCY: "18"
      NUCLEI_SEVERITY: "critical,high,medium"
  deep:
    timeout: 360
    env:
      NUCLEI_RATE_LIMIT: "150"
      NUCLEI_CONCURRENCY: "25"
      NUCLEI_SEVERITY: "critical,high,medium,low"
exit_codes:
  binary: nuclei
  codes:
    0: Scan finished — no critical issues per exit-code flags (default behavior).
    1: Vulnerabilities or matches found when configured to fail on findings.
    2: Fatal error — bad args, template error, or crash.
