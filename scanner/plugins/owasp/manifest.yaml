id: owasp
version: '1.0'
display_name: OWASP Dependency Check
description: OWASP's dependency vulnerability scanner. Identifies known vulnerabilities
  in project dependencies.
categories:
- dependency
- sca
icon: 🔒
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - dependency-check
  - --version
homepage: https://owasp.org/www-project-dependency-check/
documentation: https://jeremylong.github.io/DependencyCheck/
install:
- - wget
  - https://api.github.com/repos/jeremylong/DependencyCheck/releases/latest
  - -O
  - /tmp/owasp-release.json
- - /bin/sh
  - -c
  - OWASP_DC_URL=$(cat /tmp/owasp-release.json | jq -r '.assets[] | select(.name |
    test("dependency-check.*release.zip") and (test("ant") | not) and (test("asc")
    | not)) | .browser_download_url') && wget -O dependency-check.zip $OWASP_DC_URL
- - unzip
  - dependency-check.zip
  - -d
  - /opt
- - rm
  - dependency-check.zip
- - ln
  - -s
  - /opt/dependency-check/bin/dependency-check.sh
  - /usr/local/bin/dependency-check
- - mkdir
  - -p
  - /app/owasp-dependency-check-data
assets:
- id: data
  type: data
  description: OWASP Dependency Check data cache
  mount:
    host_subpath: scanner/plugins/owasp/data
    container_path: /app/scanner/plugins/owasp/data
  update:
    enabled: true
    command:
    - dependency-check
    - --updateonly
    - --data
    - '{container_path}'
scan_profiles:
  quick:
    timeout: 180
    hints:
      depth: shallow
      intensity: low
    env:
      OWASP_DC_EXTRA_ARGS: "--nodePackageSkipDevDependencies"
  standard:
    timeout: 180
  deep:
    timeout: 240
    hints:
      depth: deep
      intensity: high
exit_codes:
  binary: dependency-check
  codes:
    0: Completed successfully (warnings may still appear in output).
    1: General error or invalid arguments.
    2: Database update or initialization failure.
    3: Report generation failure.
    4: Unable to read or analyze one or more inputs.
    5: Fatal exception during scan.
    6: One or more analyzers failed.
    7: Unable to write report output.
    8: Invalid configuration.
    9: Dependency bundling or resolution error.
    10: Archive extraction error.
    11: Network or download failure (NVD, data feeds).
    12: H2/database corruption or lock error.
    13: License or usage restriction.
    14: OSS Index / Sonatype component-reports failure — API, network, or rate limit.
    15: One or more suppression or analyzer configuration errors.
