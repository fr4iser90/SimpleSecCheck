name: owasp
install:
  - ["wget", "https://api.github.com/repos/jeremylong/DependencyCheck/releases/latest", "-O", "/tmp/owasp-release.json"]
  - ["/bin/sh", "-c", "OWASP_DC_URL=$(cat /tmp/owasp-release.json | jq -r '.assets[] | select(.name | test(\"dependency-check.*release.zip\") and (test(\"ant\") | not) and (test(\"asc\") | not)) | .browser_download_url') && wget -O dependency-check.zip $OWASP_DC_URL"]
  - ["unzip", "dependency-check.zip", "-d", "/opt"]
  - ["rm", "dependency-check.zip"]
  - ["ln", "-s", "/opt/dependency-check/bin/dependency-check.sh", "/usr/local/bin/dependency-check"]
  - ["mkdir", "-p", "/app/owasp-dependency-check-data"]
assets:
  - id: data
    type: data
    description: OWASP Dependency Check data cache
    mount:
      host_subpath: scanner/scanners/owasp/data
      container_path: /app/scanner/scanners/owasp/data
    update:
      enabled: true
      command:
        - dependency-check
        - --updateonly
        - --data
        - /app/scanner/scanners/owasp/data
