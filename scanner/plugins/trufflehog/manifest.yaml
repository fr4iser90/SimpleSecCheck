id: trufflehog
version: '1.0'
display_name: Trufflehog
description: Advanced secret scanning tool. Finds credentials, API keys, and other
  secrets in code.
categories:
- secrets
icon: 🐷
languages: null
severity_supported: false
execution:
  timeout: 600
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - trufflehog
  - --version
homepage: https://github.com/trufflesecurity/trufflehog
documentation: https://docs.trufflesecurity.com/
install:
- - /bin/sh
  - -c
  - TRUFFLEHOG_URL=$(wget -qO- https://api.github.com/repos/trufflesecurity/trufflehog/releases/latest
    | jq -r '.assets[] | select(.name | test("trufflehog.*linux.*amd64.tar.gz")) |
    .browser_download_url') && wget -O /tmp/trufflehog.tar.gz $TRUFFLEHOG_URL
- - tar
  - -xvzf
  - /tmp/trufflehog.tar.gz
  - -C
  - /opt
- - rm
  - /tmp/trufflehog.tar.gz
- - ln
  - -s
  - /opt/trufflehog
  - /usr/local/bin/trufflehog
exit_codes:
  binary: trufflehog
  codes:
    0: No verified secrets found (or scan completed).
    183: Verified secrets detected (TruffleHog convention in recent versions).
    1: Other failure — invalid source, network, or runtime error (verify with stderr).
