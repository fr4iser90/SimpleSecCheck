id: gitleaks
version: '1.0'
display_name: Gitleaks
description: Secret scanning tool for Git repositories. Detects hardcoded secrets
  and credentials.
categories:
- secrets
icon: 🔑
languages: null
severity_supported: false
execution:
  timeout: 600
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - gitleaks
  - version
homepage: https://github.com/gitleaks/gitleaks
documentation: https://github.com/gitleaks/gitleaks#readme
install:
- - /bin/sh
  - -c
  - GITLEAKS_URL=$(wget -qO- https://api.github.com/repos/gitleaks/gitleaks/releases/latest
    | jq -r '.assets[] | select(.name | test("gitleaks.*linux_x64.tar.gz")) | .browser_download_url')
    && wget -O /tmp/gitleaks.tar.gz $GITLEAKS_URL
- - tar
  - -xvzf
  - /tmp/gitleaks.tar.gz
  - -C
  - /opt
- - rm
  - /tmp/gitleaks.tar.gz
- - ln
  - -s
  - /opt/gitleaks
  - /usr/local/bin/gitleaks
