id: gitleaks
version: '1.0'
display_name: Gitleaks
description: Secret scanning tool for Git repositories. Detects hardcoded secrets
  and credentials.
categories:
- secrets
icon: 🔑
languages: null
severity_supported: false
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - gitleaks
  - version
homepage: https://github.com/gitleaks/gitleaks
documentation: https://github.com/gitleaks/gitleaks#readme
install:
- - /bin/sh
  - -c
  - GITLEAKS_URL=$(wget -qO- https://api.github.com/repos/gitleaks/gitleaks/releases/latest
    | jq -r '.assets[] | select(.name | test("gitleaks.*linux_x64.tar.gz")) | .browser_download_url')
    && wget -O /tmp/gitleaks.tar.gz $GITLEAKS_URL
- - tar
  - -xvzf
  - /tmp/gitleaks.tar.gz
  - -C
  - /opt
- - rm
  - /tmp/gitleaks.tar.gz
- - ln
  - -s
  - /opt/gitleaks
  - /usr/local/bin/gitleaks
scan_profiles:
  quick:
    timeout: 60
    hints:
      depth: shallow
      intensity: low
    env:
      GITLEAKS_EXTRA_ARGS: "--max-target-megabytes 50"
  standard:
    timeout: 90
  deep:
    timeout: 120
    hints:
      depth: deep
      intensity: high
    env:
      GITLEAKS_EXTRA_ARGS: "--max-target-megabytes 500"
exit_codes:
  binary: gitleaks
  codes:
    0: No leaks detected.
    1: Leaks detected or scan failed.
    126: Invalid config or path.
