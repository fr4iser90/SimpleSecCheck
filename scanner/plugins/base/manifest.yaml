id: base
version: '1.0'
display_name: Base
description: Base image dependencies for scanner container (Python, Node, Java, Docker
  CLI, etc.).
categories:
- code
languages: null
severity_supported: false
execution:
  timeout: 0
install:
- - apt-get
  - update
- - apt-get
  - install
  - -y
  - python3
  - python3-pip
  - wget
  - curl
  - jq
  - git
  - openjdk-17-jre
  - unzip
  - docker.io
- - /bin/sh
  - -c
  - ln -sf /usr/bin/python3 /usr/bin/python
- - pip3
  - install
  - pyyaml
  - json5
  - beautifulsoup4
  - flask
  - requests
  - defusedxml
  - asyncpg
exit_codes:
  note: Base image manifest only — no scanner CLI. Individual plugins define exit_codes
    per tool.
