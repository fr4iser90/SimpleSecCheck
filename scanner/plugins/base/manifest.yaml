name: base
install:
  - ["apt-get", "update"]
  # Note: nodejs and npm are already installed via NodeSource in Dockerfile
  # docker.io is needed for docker_bench scanner (uses docker CLI to access host Docker socket)
  - ["apt-get", "install", "-y", "python3", "python3-pip", "wget", "curl", "jq", "git", "openjdk-17-jre", "unzip", "docker.io"]
  - ["/bin/sh", "-c", "ln -sf /usr/bin/python3 /usr/bin/python"]
  - ["pip3", "install", "pyyaml", "json5", "beautifulsoup4", "flask", "requests", "defusedxml", "asyncpg"]
