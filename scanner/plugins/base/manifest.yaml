name: base
install:
  - ["apt-get", "update"]
  - ["apt-get", "install", "-y", "python3", "python3-pip", "wget", "curl", "jq", "git", "openjdk-17-jre", "unzip", "docker.io", "nodejs", "npm"]
  - ["/bin/sh", "-c", "ln -sf /usr/bin/python3 /usr/bin/python"]
  - ["pip3", "install", "pyyaml", "json5", "beautifulsoup4", "flask", "requests", "defusedxml", "asyncpg"]
