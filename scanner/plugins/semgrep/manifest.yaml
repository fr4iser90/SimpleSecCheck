id: semgrep
version: '1.0'
display_name: Semgrep
description: Static analysis tool for multiple languages. Finds bugs and security
  vulnerabilities in code.
categories:
- code
- sast
icon: 🔍
languages:
- python
- javascript
- typescript
- java
- go
- ruby
- c
- cpp
- csharp
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - semgrep
  - --version
homepage: https://semgrep.dev
documentation: https://semgrep.dev/docs/
install:
# Semgrep (PyPI) declares click~=8.1.x; install in one pip invocation with explicit
# click/typer floors so the resolver cannot leave click<8.1 (breaks typer/safety CLI).
- - pip3
  - install
  - --upgrade
  - pip
  - setuptools
  - wheel
- - /bin/sh
  - -c
  - pip3 uninstall -y typing_extensions pydantic pydantic_core semgrep || true
- - pip3
  - install
  - --force-reinstall
  - --no-cache-dir
  - typing_extensions>=4.14.1
  - pydantic>=2.0.0
  - pydantic-core>=2.0.0
- - pip3
  - install
  - semgrep
  - "click>=8.1.3"
  - "typer>=0.12.0"
scan_profiles:
  quick:
    timeout: 240
    hints:
      depth: shallow
      intensity: low
      coverage: essential
    env:
      SEMGREP_PROFILE_CONFIGS: p/ci
      SEMGREP_RUN_SECURITY_DEEP: "0"
  standard:
    timeout: 300
    hints:
      depth: medium
      intensity: medium
      coverage: balanced
    env:
      SEMGREP_PROFILE_CONFIGS: p/ci,p/owasp-top-ten
      SEMGREP_RUN_SECURITY_DEEP: "1"
  deep:
    timeout: 360
    hints:
      depth: deep
      intensity: high
      coverage: broad
    env:
      SEMGREP_PROFILE_CONFIGS: p/ci,p/owasp-top-ten,p/security-audit
      SEMGREP_RUN_SECURITY_DEEP: "1"
exit_codes:
  binary: semgrep
  codes:
    0: Scan finished successfully (no runtime failure; findings depend on rules/severity).
    1: Blocking findings or policy failure (often used when --error or high-severity issues).
    2: Fatal error — invalid CLI, bad config/rules, or scan could not run.
    3: Internal engine error.
    4: Invalid pattern or rule syntax.
    5: File/IO error.
    7: Scan timeout.
    8: Out of memory.
    13: Interrupted (SIGINT).
    99: Unexpected error.
