id: codeql
version: '1.0'
display_name: Codeql
description: GitHub's semantic code analysis engine. Finds security vulnerabilities
  using queries.
categories:
- code
- sast
icon: 🔎
languages:
- python
- javascript
- java
- cpp
- csharp
- go
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - codeql
  - version
homepage: https://codeql.github.com
documentation: https://codeql.github.com/docs/
install:
- - /bin/sh
  - -c
  - CODEQL_URL=$(wget -qO- https://api.github.com/repos/github/codeql-cli-binaries/releases/latest
    | jq -r '.assets[] | select(.name | test("codeql-linux64.zip")) | .browser_download_url')
    && wget -O /tmp/codeql.zip $CODEQL_URL
- - unzip
  - /tmp/codeql.zip
  - -d
  - /opt
- - rm
  - /tmp/codeql.zip
- - ln
  - -s
  - /opt/codeql/codeql
  - /usr/local/bin/codeql
- - codeql
  - pack
  - download
  - codeql/python-queries
- - codeql
  - pack
  - download
  - codeql/javascript-queries
- - codeql
  - pack
  - download
  - codeql/java-queries
- - codeql
  - pack
  - download
  - codeql/cpp-queries
- - codeql
  - pack
  - download
  - codeql/csharp-queries
- - codeql
  - pack
  - download
  - codeql/go-queries
scan_profiles:
  quick:
    timeout: 180
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 240
  deep:
    timeout: 300
    hints:
      depth: deep
      intensity: high
exit_codes:
  binary: codeql
  codes:
    0: Command succeeded.
    1: General error.
    2: User error — invalid arguments or usage.
    32: Query compilation or resolution error.
    33: Database incompatible or corrupt.
    34: Resource limit (memory, disk).
    35: Interrupted.
    36: Internal error.
    37: License or feature restriction.
    38: Network or download failure.
    39: Toolchain or extractor failure.
