id: clair
version: '1.0'
display_name: Clair
description: Container vulnerability scanner. Analyzes container images for known
  vulnerabilities.
categories:
- container
- container_security
icon: 🐳
languages: null
severity_supported: true
execution:
  timeout: 900
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - clair
  - --version
homepage: https://github.com/quay/clair
documentation: https://github.com/quay/clair/tree/main/documentation
install: []
assets:
- id: config
  type: config
  description: Clair config
  mount:
    host_subpath: scanner/plugins/clair/config/config.yaml
    container_path: /app/scanner/plugins/clair/config/config.yaml
exit_codes:
  binary: clair
  note: Clair is often API-driven; local CLI exit codes depend on wrapper/client used.
  codes:
    0: Command succeeded.
    1: Generic failure — registry unreachable, bad manifest, or API error.
