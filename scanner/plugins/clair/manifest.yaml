name: clair
version: "1.0"
description: Container vulnerability scanner. Analyzes container images for known vulnerabilities.
categories:
  - Container Security
icon: "🐳"
category: container
languages: []
severity_supported: true
timeout: 900
homepage: https://github.com/quay/clair
documentation: https://github.com/quay/clair/tree/main/documentation
install: []
assets:
  - id: config
    type: config
    description: Clair config
    mount:
      host_subpath: scanner/plugins/clair/config/config.yaml
      container_path: /app/scanner/plugins/clair/config/config.yaml