id: kube_hunter
version: '1.0'
display_name: Kube Hunter
description: Kubernetes penetration testing tool. Hunts for security weaknesses in
  Kubernetes clusters.
categories:
- container
- kubernetes_security
- penetration_testing
icon: 🎯
languages: null
severity_supported: true
execution:
  timeout: 600
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - kube-hunter
  - --version
homepage: https://github.com/aquasecurity/kube-hunter
documentation: https://github.com/aquasecurity/kube-hunter#readme
install:
- - pip3
  - install
  - kube-hunter
