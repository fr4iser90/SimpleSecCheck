id: kube_hunter
version: '1.0'
display_name: Kube Hunter
description: Kubernetes penetration testing tool. Hunts for security weaknesses in
  Kubernetes clusters.
categories:
- container
- kubernetes_security
- penetration_testing
icon: 🎯
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - kube-hunter
  - --version
homepage: https://github.com/aquasecurity/kube-hunter
documentation: https://github.com/aquasecurity/kube-hunter#readme
install:
- - pip3
  - install
  - kube-hunter
scan_profiles:
  quick:
    timeout: 90
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 150
  deep:
    timeout: 240
    hints:
      depth: deep
      intensity: high
    env:
      KUBE_HUNTER_EXTRA_ARGS: "--active"
exit_codes:
  binary: kube-hunter
  codes:
    0: Run completed (may still report findings in output).
    1: Error — could not reach API, auth failure, or internal error.
