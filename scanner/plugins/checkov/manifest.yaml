name: checkov
version: "1.0"
description: Infrastructure as Code security scanner. Scans Terraform, CloudFormation, and Kubernetes configs.
categories:
  - IaC Security
  - Config Scanning
icon: "☁️"
category: iac
languages: []
severity_supported: true
timeout: 900
homepage: https://www.checkov.io
documentation: https://www.checkov.io/documentation.html
install:
  - ["pip3", "install", "checkov"]
  - ["pip3", "install", "--upgrade", "bc-detect-secrets"]
assets:
  - id: config
    type: config
    description: Checkov config
    mount:
      host_subpath: scanner/plugins/checkov/config/config.yaml
      container_path: /app/scanner/plugins/checkov/config/config.yaml