id: checkov
version: '1.0'
display_name: Checkov
description: Infrastructure as Code security scanner. Scans Terraform, CloudFormation,
  and Kubernetes configs.
categories:
- iac
- config
icon: ☁️
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - checkov
  - --version
homepage: https://www.checkov.io
documentation: https://www.checkov.io/documentation.html
# Install only `checkov` (pulls a compatible bc-detect-secrets). Do NOT add
# `pip install --upgrade bc-detect-secrets` after — it overrides Checkov's pin and
# breaks the secrets runner (e.g. AttributeError: JSON on FileType in detector_utils).
install:
- - pip3
  - install
  - checkov
assets:
- id: config
  type: config
  description: Checkov config
  mount:
    host_subpath: scanner/plugins/checkov/config/config.yaml
    container_path: /app/scanner/plugins/checkov/config/config.yaml
scan_profiles:
  quick:
    timeout: 60
    hints:
      depth: shallow
      intensity: low
    env:
      CHECKOV_EXTRA_ARGS: "--compact"
  standard:
    timeout: 90
  deep:
    timeout: 120
    hints:
      depth: deep
      intensity: high
    env:
      # Prefer official env (see Checkov CLI ref: DOWNLOAD_EXTERNAL_MODULES). Avoids broken
      # merges where CHECKOV_EXTRA_ARGS is only "--download-external-modules" without a value.
      DOWNLOAD_EXTERNAL_MODULES: "true"
exit_codes:
  binary: checkov
  codes:
    0: Success — no failed checks (or soft-fail policy satisfied).
    1: One or more checks failed (misconfigurations detected).
    2: Fatal error — invalid CLI, crash, or could not run.
