# Checkov CLI config for SimpleSecCheck (`checkov --config-file`).
#
# IMPORTANT: Do not add a top-level key `version`. Checkov maps YAML keys to CLI flags;
# `version: "1.0"` becomes `-v 1.0` and aborts with:
#   checkov: error: argument -v/--version: ignored explicit argument '1.0'
#
# Human-oriented pattern notes live in manifest / docs, not here — only Checkov-supported keys.

soft-fail: true
evaluate-variables: true
summary-position: bottom
