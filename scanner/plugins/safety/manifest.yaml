id: safety
version: '1.0'
display_name: Safety
description: Python dependency vulnerability scanner. Checks Python packages against
  known vulnerabilities.
categories:
- dependency
icon: 🐍
languages:
- python
severity_supported: true
execution:
  timeout: 300
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - safety
  - --version
homepage: https://github.com/pyupio/safety
documentation: https://docs.pyup.io/docs/safety-cli
install:
- - pip3
  - install
  - safety
# Typer (pulled by safety) needs click>=8.1 for generic click.Choice[...] on Python 3.10
- - pip3
  - install
  - --upgrade
  - "click>=8.1.3"
- - pip3
  - install
  - pip-audit
exit_codes:
  binary: safety
  codes:
    0: No vulnerabilities reported for scanned dependencies.
    1: Vulnerabilities found OR CLI/runtime crash (inspect stderr — traceback means broken
      install/Python deps, not “CVE count”).
    2: Invalid arguments or missing files.
    3: Safety DB or authentication error (API key / subscription).
    64: Deprecated in some versions for auth/DB issues — check Safety CLI docs for your
      version.
