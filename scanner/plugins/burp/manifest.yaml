id: burp
version: '1.0'
display_name: Burp
description: Burp Suite - Web application security testing platform.
categories:
- web
- web_application_security
- dast
icon: 🔪
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
homepage: https://portswigger.net/burp
documentation: https://portswigger.net/burp/documentation
install:
- - wget
  - -q
  - https://portswigger.net/burp/releases/download?product=community&version=2024.2.5
  - -O
  - /tmp/burp-suite.jar
- - mkdir
  - -p
  - /opt/burp
- - mv
  - /tmp/burp-suite.jar
  - /opt/burp/burp-suite.jar
- - chmod
  - +x
  - /opt/burp/burp-suite.jar
scan_profiles:
  quick:
    timeout: 180
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 300
  deep:
    timeout: 600
    hints:
      depth: deep
      intensity: high
exit_codes:
  binary: java
  note: Burp is launched via JVM — exit codes follow Java/headless Burp driver behavior.
  codes:
    0: Process exited normally.
    1: Error — GUI required, license, or launch failure.
