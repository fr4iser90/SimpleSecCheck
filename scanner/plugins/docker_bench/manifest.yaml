id: docker_bench
version: '1.0'
display_name: Docker Bench
description: Docker security benchmark. Checks Docker daemon configuration against
  CIS benchmarks.
categories:
- container
- container_security
- configuration
icon: 🐋
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
homepage: https://github.com/docker/docker-bench-security
documentation: https://github.com/docker/docker-bench-security#readme
install:
- - git
  - clone
  - https://github.com/docker/docker-bench-security.git
  - /opt/docker-bench-security
- - ln
  - -s
  - /opt/docker-bench-security/docker-bench-security.sh
  - /usr/local/bin/docker-bench-security
- - chmod
  - +x
  - /opt/docker-bench-security/docker-bench-security.sh
scan_profiles:
  quick:
    timeout: 90
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 120
  deep:
    timeout: 150
    hints:
      depth: deep
      intensity: high
exit_codes:
  binary: docker-bench-security.sh
  codes:
    0: All checks passed.
    1: One or more benchmark checks failed.
    2: Script error — Docker socket missing or permission denied.
