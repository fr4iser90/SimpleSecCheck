id: npm_audit
version: '1.0'
display_name: Npm Audit
description: Node.js package vulnerability scanner. Checks npm dependencies for known
  security issues.
categories:
- dependency
icon: 📦
languages:
- javascript
- typescript
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - npm
  - -v
homepage: https://docs.npmjs.com/cli/v8/commands/npm-audit
documentation: https://docs.npmjs.com/cli/v8/commands/npm-audit
install: []
scan_profiles:
  quick:
    timeout: 60
    hints:
      depth: shallow
      intensity: low
      coverage: high-severity advisories only
    env:
      NPM_AUDIT_EXTRA_ARGS: --audit-level=high
  standard:
    timeout: 90
    env:
      NPM_AUDIT_EXTRA_ARGS: --audit-level=moderate
  deep:
    timeout: 120
    hints:
      depth: deep
      intensity: high
      coverage: low severity and above
    env:
      NPM_AUDIT_EXTRA_ARGS: --audit-level=low
exit_codes:
  binary: npm
  codes:
    0: No vulnerabilities found (audit clean).
    1: Vulnerabilities found above configured level.
