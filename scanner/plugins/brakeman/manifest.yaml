id: brakeman
version: '1.0'
display_name: Brakeman
description: Static analysis security scanner for Ruby on Rails applications.
categories:
- code
- sast
icon: 💎
languages:
- ruby
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - brakeman
  - --version
homepage: https://brakemanscanner.org
documentation: https://brakemanscanner.org/docs/
install:
- - apt-get
  - update
- - apt-get
  - install
  - -y
  - ruby
  - ruby-dev
  - build-essential
- - gem
  - install
  - brakeman
  - --no-document
# Brakeman -w: higher = stricter filter (fewer warnings). 3 = High only, 1 = Weak+Medium+High
scan_profiles:
  quick:
    timeout: 120
    hints:
      depth: shallow
      intensity: low
      coverage: high-confidence findings only
    env:
      BRAKEMAN_CONFIDENCE_MIN: "3"
  standard:
    timeout: 180
    env:
      BRAKEMAN_CONFIDENCE_MIN: "2"
  deep:
    timeout: 300
    hints:
      depth: deep
      intensity: high
      coverage: all confidence levels
    env:
      BRAKEMAN_CONFIDENCE_MIN: "1"
exit_codes:
  binary: brakeman
  codes:
    0: No warnings (or scan completed with no high-severity issues, depending on flags).
    1: Security warnings found.
    2: Scan error — invalid path, not a Rails app, or Brakeman crashed.
    3: File not found or permission error.
    4: Invalid options.
    5: Syntax error in Ruby code.
    6: Plugin load error.
    255: Unexpected failure.
