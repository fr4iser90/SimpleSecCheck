id: brakeman
version: '1.0'
display_name: Brakeman
description: Static analysis security scanner for Ruby on Rails applications.
categories:
- code
- sast
icon: 💎
languages:
- ruby
severity_supported: true
execution:
  timeout: 600
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - brakeman
  - --version
homepage: https://brakemanscanner.org
documentation: https://brakemanscanner.org/docs/
install:
- - apt-get
  - update
- - apt-get
  - install
  - -y
  - ruby
  - ruby-dev
  - build-essential
- - gem
  - install
  - brakeman
  - --no-document
exit_codes:
  binary: brakeman
  codes:
    0: No warnings (or scan completed with no high-severity issues, depending on flags).
    1: Security warnings found.
    2: Scan error — invalid path, not a Rails app, or Brakeman crashed.
    3: File not found or permission error.
    4: Invalid options.
    5: Syntax error in Ruby code.
    6: Plugin load error.
    255: Unexpected failure.
