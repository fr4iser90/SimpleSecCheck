id: bandit
version: '1.0'
display_name: Bandit
description: Python security linter. Scans Python code for common security issues.
categories:
- code
- sast
icon: 🐍
languages:
- python
severity_supported: true
execution:
  timeout: 600
homepage: https://github.com/PyCQA/bandit
documentation: https://bandit.readthedocs.io/
install:
- - pip3
  - install
  - bandit[toml]
