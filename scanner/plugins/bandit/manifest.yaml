id: bandit
version: '1.0'
display_name: Bandit
description: Python security linter. Scans Python code for common security issues.
categories:
- code
- sast
icon: 🐍
languages:
- python
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - bandit
  - --version
homepage: https://github.com/PyCQA/bandit
documentation: https://bandit.readthedocs.io/
install:
- - pip3
  - install
  - bandit[toml]
# Bandit: -lll = HIGH only, -ll = MEDIUM+, -l = LOW+ (full severity range)
scan_profiles:
  quick:
    timeout: 120
    hints:
      depth: shallow
      intensity: low
      coverage: high-severity findings only
    env:
      BANDIT_EXTRA_ARGS: "-lll"
  standard:
    timeout: 180
    hints:
      depth: medium
      intensity: medium
      coverage: medium severity and above
    env:
      BANDIT_EXTRA_ARGS: "-ll"
  deep:
    timeout: 300
    hints:
      depth: deep
      intensity: high
      coverage: all severity levels
    env:
      BANDIT_EXTRA_ARGS: "-l"
exit_codes:
  binary: bandit
  codes:
    0: No issues reported (or below configured severity).
    1: Issues found at or above configured severity level.
