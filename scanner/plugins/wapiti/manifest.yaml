id: wapiti
version: '1.0'
display_name: Wapiti
description: Web application vulnerability scanner. Detects security flaws in web
  applications.
categories:
- web
- web_application_security
- dast
icon: 🕸️
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - wapiti
  - --version
homepage: https://wapiti-scanner.github.io/
documentation: https://wapiti-scanner.github.io/documentation/
install:
- - pip3
  - install
  - wapiti3
- - pip3
  - install
  - --force-reinstall
  - --no-cache-dir
  - typing_extensions>=4.14.1
# -d = crawl depth (shallow vs deep DAST)
scan_profiles:
  quick:
    timeout: 120
    hints:
      depth: shallow
      intensity: low
      coverage: limited crawl depth
    env:
      WAPITI_EXTRA_ARGS: "-d 2"
  standard:
    timeout: 240
    env:
      WAPITI_EXTRA_ARGS: -d 5
  deep:
    timeout: 360
    hints:
      depth: deep
      intensity: high
      coverage: deeper crawl
    env:
      WAPITI_EXTRA_ARGS: "-d 15"
exit_codes:
  binary: wapiti
  codes:
    0: Scan completed successfully.
    1: Vulnerabilities or anomalies reported (depends on Wapiti version/flags).
    2: Invalid URL, crawl error, or scanner crash.
