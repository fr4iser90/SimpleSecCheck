id: anchore
version: '1.0'
display_name: Anchore
description: Container image security scanner. Scans container images for vulnerabilities
  and policy violations.
categories:
- container
- container_security
icon: ⚓
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - grype
  - version
homepage: https://github.com/anchore/grype
documentation: https://github.com/anchore/grype#readme
install:
- - /bin/sh
  - -c
  - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh
    -s -- -b /usr/local/bin
assets:
- id: config
  type: config
  description: Anchore config
  mount:
    host_subpath: scanner/plugins/anchore/config/config.yaml
    container_path: /app/scanner/plugins/anchore/config/config.yaml
- id: data
  type: data
  description: Grype vulnerability database cache
  mount:
    host_subpath: scanner/plugins/anchore/data
    container_path: /app/scanner/plugins/anchore/data
  update:
    enabled: true
    command:
    - grype
    - db
    - update
    - --config
    - /app/scanner/plugins/anchore/config/config.yaml
scan_profiles:
  quick:
    timeout: 120
    hints:
      depth: shallow
      intensity: low
    env:
      GRYPE_EXTRA_ARGS: "--severity critical,high"
  standard:
    timeout: 180
    env:
      GRYPE_EXTRA_ARGS: "--severity critical,high,medium"
  deep:
    timeout: 300
    hints:
      depth: deep
      intensity: high
exit_codes:
  binary: grype
  codes:
    0: Success — no vulnerabilities above threshold.
    1: Vulnerabilities found matching fail-on criteria.
    2: User error — bad image ref, DB error, or could not scan.
