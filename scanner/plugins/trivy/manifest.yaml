id: trivy
version: '1.0'
display_name: Trivy
description: Comprehensive security scanner. Scans filesystems, dependencies, and
  container images for vulnerabilities.
categories:
- dependency
- container_security
- filesystem_scanning
icon: 🛡️
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - trivy
  - version
homepage: https://github.com/aquasecurity/trivy
documentation: https://aquasecurity.github.io/trivy/
install:
- - /bin/sh
  - -c
  - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
    | sh -s -- -b /usr/local/bin
assets:
- id: config
  type: config
  description: Trivy config
  mount:
    host_subpath: scanner/plugins/trivy/config/config.yaml
    container_path: /app/scanner/plugins/trivy/config/config.yaml
- id: cache
  type: data
  description: Trivy vulnerability database cache
  mount:
    host_subpath: scanner/plugins/trivy/data
    container_path: /app/scanner/plugins/trivy/data
  update:
    enabled: true
    env:
      TRIVY_CACHE_DIR: '{container_path}'
    command:
    - trivy
    - image
    - --download-db-only
scan_profiles:
  quick:
    timeout: 90
    hints:
      depth: shallow
      intensity: low
      coverage: critical/high vulns only; no secret/config/license substeps
    env:
      TRIVY_SEVERITY: HIGH,CRITICAL
      TRIVY_COMPREHENSIVE_SCANNERS: vuln
      TRIVY_RUN_SECRET_SCAN: "0"
      TRIVY_RUN_CONFIG_SCAN: "0"
      TRIVY_RUN_LICENSE_SCAN: "0"
  standard:
    timeout: 120
    env:
      TRIVY_SEVERITY: HIGH,CRITICAL,MEDIUM
      TRIVY_COMPREHENSIVE_SCANNERS: vuln,secret,config
      TRIVY_RUN_SECRET_SCAN: "1"
      TRIVY_RUN_CONFIG_SCAN: "1"
      TRIVY_RUN_LICENSE_SCAN: "0"
  deep:
    timeout: 180
    hints:
      depth: deep
      intensity: high
      coverage: full severity range and license scan
    env:
      TRIVY_SEVERITY: HIGH,CRITICAL,MEDIUM,LOW
      TRIVY_COMPREHENSIVE_SCANNERS: vuln,secret,config
      TRIVY_RUN_SECRET_SCAN: "1"
      TRIVY_RUN_CONFIG_SCAN: "1"
      TRIVY_RUN_LICENSE_SCAN: "1"
exit_codes:
  binary: trivy
  codes:
    0: Success — scan completed; no issues above configured severity/exit threshold.
    1: Vulnerabilities or misconfigurations found (default when issues exceed exit policy).
    2: Fatal error — bad arguments, DB failure, or scan could not complete.
