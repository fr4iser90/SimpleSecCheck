id: trivy
version: '1.0'
display_name: Trivy
description: Comprehensive security scanner. Scans filesystems, dependencies, and
  container images for vulnerabilities.
categories:
- dependency
- container_security
- filesystem_scanning
icon: 🛡️
languages: null
severity_supported: true
execution:
  timeout: 900
homepage: https://github.com/aquasecurity/trivy
documentation: https://aquasecurity.github.io/trivy/
install:
- - /bin/sh
  - -c
  - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
    | sh -s -- -b /usr/local/bin
assets:
- id: config
  type: config
  description: Trivy config
  mount:
    host_subpath: scanner/plugins/trivy/config/config.yaml
    container_path: /app/scanner/plugins/trivy/config/config.yaml
- id: cache
  type: data
  description: Trivy vulnerability database cache
  mount:
    host_subpath: scanner/plugins/trivy/cache
    container_path: /app/scanner/plugins/trivy/cache
