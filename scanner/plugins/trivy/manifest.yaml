name: trivy
install:
  - ["/bin/sh", "-c", "curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin"]
assets:
  - id: config
    type: config
    description: Trivy config
    mount:
      host_subpath: scanner/scanners/trivy/config/config.yaml
      container_path: /app/scanner/scanners/trivy/config/config.yaml