id: android
version: '1.0'
display_name: Android
description: Android application security scanner. Analyzes Android APK files for
  security issues.
categories:
- code
- mobile
icon: 📱
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
homepage: https://developer.android.com/studio
documentation: https://developer.android.com/studio
install:
- - pip3
  - install
  - defusedxml
scan_profiles:
  quick:
    timeout: 90
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 150
  deep:
    timeout: 240
    hints:
      depth: deep
      intensity: high
exit_codes:
  note: No single upstream CLI — SimpleSecCheck Android scan uses Python; interpret logs
    in plugin output, not a fixed exit table.
