id: terraform
version: '1.0'
display_name: Terraform
description: Terraform security scanner. Validates Terraform configurations for security
  best practices.
categories:
- iac
icon: 🏗️
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - checkov
  - --version
homepage: https://www.checkov.io
documentation: https://www.checkov.io/documentation.html
install:
- - pip3
  - install
  - checkov
assets:
- id: config
  type: config
  description: Terraform Checkov config
  mount:
    host_subpath: scanner/plugins/terraform/config/config.yaml
    container_path: /app/scanner/plugins/terraform/config/config.yaml
scan_profiles:
  quick:
    timeout: 90
    hints:
      depth: shallow
      intensity: low
    env:
      TERRAFORM_SCAN_EXTRA_ARGS: "--compact"
  standard:
    timeout: 150
  deep:
    timeout: 240
    hints:
      depth: deep
      intensity: high
    env:
      TERRAFORM_SCAN_EXTRA_ARGS: "--download-external-modules"
exit_codes:
  binary: checkov
  note: Terraform plugin runs Checkov on .tf files — same exit semantics as checkov.
  codes:
    0: No failed checks.
    1: Failed IaC checks detected.
    2: Fatal error — could not run.
