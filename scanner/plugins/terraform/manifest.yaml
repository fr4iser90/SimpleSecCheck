id: terraform
version: '1.0'
display_name: Terraform
description: Terraform security scanner. Validates Terraform configurations for security
  best practices.
categories:
- iac
icon: 🏗️
languages: null
severity_supported: true
execution:
  timeout: 600
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - checkov
  - --version
homepage: https://www.checkov.io
documentation: https://www.checkov.io/documentation.html
install:
- - pip3
  - install
  - checkov
assets:
- id: config
  type: config
  description: Terraform Checkov config
  mount:
    host_subpath: scanner/plugins/terraform/config/config.yaml
    container_path: /app/scanner/plugins/terraform/config/config.yaml
