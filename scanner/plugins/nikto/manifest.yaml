id: nikto
version: '1.0'
display_name: Nikto
description: Web server scanner. Tests web servers for dangerous files and misconfigurations.
categories:
- web
- web_application_security
icon: 🌐
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
  version_command:
  - nikto
  - -Version
homepage: https://github.com/sullo/nikto
documentation: https://cirt.net/Nikto2
install:
- - apt-get
  - update
- - apt-get
  - install
  - -y
  - perl
  - libwww-perl
  - liblwp-protocol-https-perl
  - unzip
- - wget
  - https://github.com/sullo/nikto/archive/master.zip
  - -O
  - /tmp/nikto.zip
- - unzip
  - /tmp/nikto.zip
- - mv
  - nikto-main
  - /opt/nikto
- - ln
  - -s
  - /opt/nikto/program/nikto.pl
  - /usr/local/bin/nikto
- - rm
  - /tmp/nikto.zip
# -Tuning: digit string selects test categories (1–9); more digits = broader coverage
scan_profiles:
  quick:
    timeout: 60
    hints:
      depth: shallow
      intensity: low
      coverage: focused test categories
    env:
      NIKTO_EXTRA_ARGS: "-Tuning 123"
  standard:
    timeout: 120
    env:
      NIKTO_EXTRA_ARGS: "-Tuning 123456"
  deep:
    timeout: 180
    hints:
      depth: deep
      intensity: high
      coverage: all tuning categories
    env:
      NIKTO_EXTRA_ARGS: "-Tuning 123456789"
exit_codes:
  binary: nikto
  codes:
    0: Scan completed (Nikto often returns 0 even with findings — read report).
    1: Error — invalid target, connection failure, or Perl/runtime error.
