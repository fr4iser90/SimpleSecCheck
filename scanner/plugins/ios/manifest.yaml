id: ios
version: '1.0'
display_name: Ios
description: iOS application security scanner. Analyzes iOS IPA files and plist configurations.
categories:
- code
- mobile
icon: 🍎
languages: null
severity_supported: true
checkpoint:
  primary_artifact: report.json
  artifact_format: json
homepage: https://developer.apple.com/
documentation: https://developer.apple.com/documentation/
install:
- - pip3
  - install
  - defusedxml
scan_profiles:
  quick:
    timeout: 90
    hints:
      depth: shallow
      intensity: low
  standard:
    timeout: 150
  deep:
    timeout: 240
    hints:
      depth: deep
      intensity: high
exit_codes:
  note: No single upstream CLI — iOS plugin uses Python analysis; see scan logs for errors.
