# GitLeaks Configuration for SimpleSecCheck

# Global settings
[global]
  numWorkers = 10
  verbose = false
  verboseResults = false

# Allowlist: Exclude common false positive paths
[allowlist]
  description = "Exclude node_modules, build artifacts, and documentation"
  paths = [
    # Dependencies and build artifacts
    '''node_modules/''',
    '''\.vite/''',
    '''dist/''',
    '''build/''',
    '''\.next/''',
    '''\.nuxt/''',
    '''coverage/''',
    '''\.cache/''',
    # TypeScript definitions and source maps (common false positives)
    '''\.d\.ts$''',
    '''\.map$''',
    # Documentation files (often contain example code)
    '''README\.md$''',
    '''\.md$''',
    '''docs/''',
    # Lock files
    '''package-lock\.json$''',
    '''yarn\.lock$''',
    '''pnpm-lock\.yaml$''',
  ]

# Rules for different secret types
[[rules]]
  description = "Generic API Key"
  id = "generic-api-key"
  regex = '''(?i)(api[_-]?key|apikey)\s*[=:]\s*['"]?([a-z0-9]{20,})['"]?'''

[[rules]]
  description = "AWS Access Key"
  id = "aws-access-key"
  regex = '''AKIA[0-9A-Z]{16}'''

[[rules]]
  description = "GitHub Token"
  id = "github-token"
  regex = '''ghp_[0-9a-zA-Z]{36}'''

[[rules]]
  description = "Private Key"
  id = "private-key"
  regex = '''-----BEGIN\s+(?:RSA|EC|DSA)\s+PRIVATE\s+KEY-----'''

[[rules]]
  description = "JWT Token"
  id = "jwt-token"
  regex = '''eyJ[A-Za-z0-9-_=]+\.eyJ[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*'''

[[rules]]
  description = "Database Password"
  id = "database-password"
  # More specific: only match database-related password patterns
  # Exclude common false positives like "password" in function names or documentation
  regex = '''(?i)(?:database|db|mysql|postgres|mongodb|redis)[\s_-]*(?:password|pwd|pass)[\s=:]+['"]?([a-zA-Z0-9!@#$%^&*]{8,})['"]?'''

[[rules]]
  description = "Slack Token"
  id = "slack-token"
  regex = '''xox[baprs]-([0-9a-zA-Z-]{10,48})'''

[[rules]]
  description = "Stripe API Key"
  id = "stripe-key"
  regex = '''sk_live_[0-9a-zA-Z]{24,}'''

[[rules]]
  description = "Google API Key"
  id = "google-api-key"
  regex = '''AIza[0-9A-Za-z-_]{35}'''

[[rules]]
  description = "Mailgun API Key"
  id = "mailgun-key"
  regex = '''key-[0-9a-zA-Z]{32}'''

